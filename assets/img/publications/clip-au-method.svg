  <rect width="720" height="420" rx="26" fill="url(#b)"/>
  <text x="38" y="52" font-family="Inter,Arial" font-size="26" font-weight="850" fill="#111827">CLIP-AU</text>
  <text x="38" y="80" font-family="Inter,Arial" font-size="14" fill="#667085">AU-guided temporal learning for subject-agnostic emotion cues</text>
  <g transform="translate(38 130)">
