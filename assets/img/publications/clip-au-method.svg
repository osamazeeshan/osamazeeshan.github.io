<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">CLIP-AU method</title>
  <desc id="desc">Compact diagram for CLIP-AU with video frames, AU prompts, temporal modeling, and emotion prediction.</desc>
