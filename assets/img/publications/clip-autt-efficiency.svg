<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">CLIP-AUTT efficiency analysis</title>
  <desc id="desc">A stylized efficiency plot comparing accuracy, throughput, trainable parameters, and compute.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="bubble" x1="0" x2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="920" height="520" rx="34" fill="url(#bg)"/>
  <text x="52" y="58" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="#111827">Efficiency analysis</text>
  <text x="52" y="88" font-family="Inter, Arial, sans-serif" font-size="15" fill="#667085">Fig. 1(d): higher WAR and throughput with fewer trainable parameters and lower GFLOPs is preferred.</text>
  <line x1="96" y1="410" x2="820" y2="410" stroke="#94a3b8" stroke-width="2"/>
  <line x1="96" y1="410" x2="96" y2="130" stroke="#94a3b8" stroke-width="2"/>
  <text x="405" y="468" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#334155">WAR / recognition performance →</text>
  <text x="28" y="292" transform="rotate(-90 28 292)" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#334155">Throughput (videos/sec) ↑</text>
  <g stroke="#e2e8f0" stroke-width="1">
    <line x1="96" y1="340" x2="820" y2="340"/><line x1="96" y1="270" x2="820" y2="270"/><line x1="96" y1="200" x2="820" y2="200"/><line x1="240" y1="130" x2="240" y2="410"/><line x1="410" y1="130" x2="410" y2="410"/><line x1="580" y1="130" x2="580" y2="410"/><line x1="750" y1="130" x2="750" y2="410"/>
  </g>
  <g opacity="0.92">
    <circle cx="260" cy="345" r="42" fill="#cbd5e1" filter="url(#shadow)"/><text x="214" y="410" font-family="Inter, Arial" font-size="14" fill="#475569">Full CLIP FT</text>
    <circle cx="455" cy="302" r="34" fill="#93c5fd" filter="url(#shadow)"/><text x="417" y="365" font-family="Inter, Arial" font-size="14" fill="#475569">CLIP-AU</text>
    <circle cx="675" cy="198" r="24" fill="url(#bubble)" filter="url(#shadow)"/><text x="625" y="252" font-family="Inter, Arial" font-size="15" font-weight="800" fill="#1d4ed8">CLIP-AUTT</text>
  </g>
  <g transform="translate(602 306)">
    <rect width="245" height="92" rx="18" fill="#ffffff" stroke="#dbeafe"/>
    <circle cx="24" cy="27" r="9" fill="url(#bubble)"/><text x="43" y="33" font-family="Inter, Arial" font-size="14" fill="#334155">Best accuracy-efficiency region</text>
    <circle cx="24" cy="58" r="12" fill="#93c5fd"/><text x="43" y="63" font-family="Inter, Arial" font-size="14" fill="#334155">Bubble size: trainable params</text>
  </g>
</svg>
